<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <rect width="900" height="280" fill="#0b1020"/>
  <text x="20" y="36" fill="#e8ecf3" font-family="Arial" font-size="20">Dijkstra — relajación</text>
  <text x="20" y="66" fill="#b9c0d3" font-family="Arial" font-size="14">Si dist[u] + w(u,v) &lt; dist[v] ⇒ actualizar dist[v] y pred[v]</text>

  <circle cx="220" cy="160" r="18" fill="#121a33" stroke="#e8ecf3" stroke-width="2"/>
  <circle cx="420" cy="160" r="18" fill="#121a33" stroke="#e8ecf3" stroke-width="2"/>
  <text x="214" y="166" fill="#e8ecf3" font-family="Arial" font-size="14">u</text>
  <text x="414" y="166" fill="#e8ecf3" font-family="Arial" font-size="14">v</text>
  <line x1="238" y1="160" x2="402" y2="160" stroke="#7c7cff" stroke-width="3"/>
  <text x="300" y="145" fill="#e8ecf3" font-family="Arial" font-size="14">w</text>

  <text x="520" y="150" fill="#e8ecf3" font-family="Arial" font-size="14">dist[v] = min(dist[v], dist[u] + w)</text>
</svg>
