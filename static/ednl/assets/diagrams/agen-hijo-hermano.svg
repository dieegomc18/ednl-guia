<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <rect width="900" height="280" fill="#0b1020"/>
  <text x="20" y="36" fill="#e8ecf3" font-family="Arial" font-size="20">Agen — representación hijo-izq / hermano-der</text>
  <text x="20" y="66" fill="#b9c0d3" font-family="Arial" font-size="14">Hijo izquierdo = primer hijo · Hermano derecho = siguiente hermano</text>

  <rect x="40" y="100" width="260" height="140" rx="14" fill="#121a33" stroke="#e8ecf3"/>
  <text x="60" y="130" fill="#e8ecf3" font-family="Arial" font-size="16">Nodo n</text>
  <text x="60" y="160" fill="#b9c0d3" font-family="Arial" font-size="14">hijoIzqdo(n) → primer hijo</text>
  <text x="60" y="185" fill="#b9c0d3" font-family="Arial" font-size="14">hermDrcho(h) → siguiente hermano</text>

  <line x1="330" y1="160" x2="520" y2="160" stroke="#7c7cff" stroke-width="3"/>
  <polygon points="520,160 508,152 508,168" fill="#7c7cff"/>
  <text x="360" y="148" fill="#e8ecf3" font-family="Arial" font-size="14">secuencia de hijos</text>

  <circle cx="560" cy="160" r="18" fill="#121a33" stroke="#e8ecf3" stroke-width="2"/>
  <circle cx="630" cy="160" r="18" fill="#121a33" stroke="#e8ecf3" stroke-width="2"/>
  <circle cx="700" cy="160" r="18" fill="#121a33" stroke="#e8ecf3" stroke-width="2"/>
  <text x="554" y="166" fill="#e8ecf3" font-family="Arial" font-size="14">h1</text>
  <text x="624" y="166" fill="#e8ecf3" font-family="Arial" font-size="14">h2</text>
  <text x="694" y="166" fill="#e8ecf3" font-family="Arial" font-size="14">h3</text>
  <line x1="578" y1="160" x2="612" y2="160" stroke="#7c7cff" stroke-width="3"/>
  <line x1="648" y1="160" x2="682" y2="160" stroke="#7c7cff" stroke-width="3"/>
</svg>
