name: Test build

on:
  pull_request:
    branches:
      - main

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false --prefer-offline

      - name: Check guia-completa is up-to-date
        run: npm run check:guia

      - name: Build site
        run: npm run build

      - name: Smoke test build
        run: npm run smoke
